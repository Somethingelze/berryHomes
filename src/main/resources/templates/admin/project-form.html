<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin: Project Editor - Berry Homes</title>
    <link rel="stylesheet" th:href="@{/css/admin/projects-admin.css}">
    <link rel="stylesheet" th:href="@{/css/admin/project-form.css}">
</head>
    <body>

    <div class="admin-sidebar">
        <div class="sidebar-brand">BERRY HOMES</div>
        <ul class="sidebar-menu">
            <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/admin/contacts}">Contacts / Leads</a></li>
            <li><a th:href="@{/admin/projects}" class="active">Investment Projects</a></li>
            <li><a th:href="@{/admin/settings}">System Settings</a></li>
            <li style="margin-top:auto;">
                <a th:href="@{/logout}" style="color:#FC8181;">Logout ↩</a>
            </li>
        </ul>
    </div>

    <div class="admin-content">
        <div class="page-header">
            <h1 class="page-title" th:text="${projectDto.id() == null} ? 'Create Investment Project' : 'Edit Project Details'">
                Project Editor
            </h1>
        </div>

        <!-- MAIN PROJECT FORM -->
        <div class="form-card-box">
            <form th:action="@{/admin/projects/save}" th:object="${projectDto}" method="POST" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}"/>

                <div class="form-grid-row">
                    <div class="form-group-full">
                        <label class="input-label-text">Property Address</label>
                        <input type="text" th:field="*{address}" class="admin-input-field" required>
                    </div>
                    <div class="form-group-full">
                        <label class="input-label-text">City & Zip Code</label>
                        <input type="text" th:field="*{cityZip}" class="admin-input-field" required>
                    </div>
                    <div>
                        <label class="input-label-text">Purchase Price</label>
                        <input type="text" th:field="*{purchasePrice}" class="admin-input-field">
                    </div>
                    <div>
                        <label class="input-label-text">Monthly Rent</label>
                        <input type="text" th:field="*{monthlyRent}" class="admin-input-field">
                    </div>
                    <div>
                        <label class="input-label-text">Renovation Budget</label>
                        <input type="text" th:field="*{renovationBudget}" class="admin-input-field">
                    </div>
                    <div>
                        <label class="input-label-text">Est. NOI Annual</label>
                        <input type="text" th:field="*{estNoiAnnual}" class="admin-input-field">
                    </div>
                    <div>
                        <label class="input-label-text">Total Investment</label>
                        <input type="text" th:field="*{totalInvestment}" class="admin-input-field">
                    </div>
                    <div>
                        <label class="input-label-text">Cash-on-Cash Return</label>
                        <input type="text" th:field="*{cashOnCashReturn}" class="admin-input-field">
                    </div>
                    <div class="form-group-full">
                        <label class="input-label-text">Est. Payback Period</label>
                        <input type="text" th:field="*{estPayback}" class="admin-input-field">
                    </div>
                </div>

                <!-- MEDIA UPLOAD SECTION -->
                <div class="media-management-section">
                    <h3 class="media-section-title">Upload Media & Attachments</h3>
                    <div class="form-grid-row" style="background:#F8F9FA; padding:20px; border-radius:6px; border:1px solid #E2E8F0;">
                        <div>
                            <label class="input-label-text">Upload Gallery Images</label>
                            <input type="file" name="images" accept="image/*" multiple class="admin-input-field" style="background:#fff;">
                        </div>
                        <div>
                            <label class="input-label-text">Upload Financial Report (PDF)</label>
                            <input type="file" name="document" accept="application/pdf" class="admin-input-field" style="background:#fff;">
                        </div>
                    </div>
                </div>

                <!-- EXISTING IMAGES -->
                <div th:if="${projectDto.id() != null}" style="margin-top:30px;">
                    <h4 class="input-label-text">Current Photo Gallery</h4>
                    <p th:if="${projectDto.projectImages == null or #lists.isEmpty(projectDto.projectImages)}" style="color:#A0AEC0;">
                        No images uploaded yet.
                    </p>
                    <div class="images-gallery-flex" th:if="${projectDto.projectImages != null}">
                        <div class="uploaded-image-card" th:each="img : ${projectDto.projectImages}">
                            <img th:src="@{'/' + ${img.filePath()}}" class="gallery-card-img" alt="Project image">
                            <div class="gallery-card-actions">
                                    <span style="font-size:0.8rem; color:#718096;">
                                        Order: <span th:text="${img.sortOrder()}">1</span>
                                    </span>

                                <!-- Форма изменения порядка (вызов внешней отправки через JS) -->
                                <div class="sort-order-form">
                                    <!-- Упростили ID, добавили класс для поиска через JS -->
                                    <input type="number" th:id="'sortInput-' + ${img.id()}" th:value="${img.sortOrder()}" class="sort-order-input sort-value-field">

                                    <!-- Изменили th:onclick на безопасные data-атрибуты -->
                                    <button type="button"
                                            class="btn-media-delete"
                                            style="color: #16A34A;"
                                            th:data-image-id="${img.id()}"
                                            onclick="submitExternalSort(this)">✔</button>
                                </div>

                                <!-- Кнопка удаления привязана к внешней форме через атрибут form -->
                                <button th:form="'deleteImageForm-' + ${img.id()}" type="submit" class="btn-media-delete" onclick="return confirm('Delete this image?');">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- EXISTING SINGLE DOCUMENT -->
                <div th:if="${projectDto.id() != null}" style="margin-top:30px;">
                    <h4 class="input-label-text">Current Financial Attachment</h4>
                    <p th:if="${projectDto.projectDocument == null}" style="color:#A0AEC0;">
                        No document attached yet.
                    </p>
                    <ul class="attached-docs-list" th:if="${projectDto.projectDocument != null}">
                        <li class="doc-item-row">
                            <div>
                                <span style="color:#16A34A; margin-right:8px;">📄</span>
                                <strong>
                                    <a th:href="@{'/' + ${projectDto.projectDocument.filePath()}}" target="_blank" th:text="'Project_Report_' + ${projectDto.id()} + '.pdf'">Report Name</a>
                                </strong>
                            </div>

                            <button th:form="'deleteDocForm-' + ${projectDto.projectDocument.id()}" type="submit" class="btn-media-delete" onclick="return confirm('Remove this document?');">
                                Remove Doc
                            </button>
                        </li>
                    </ul>
                </div>


                <!-- FORM ACTIONS -->
                <div class="form-footer-actions">
                    <a th:href="@{/admin/projects}" class="btn-form-cancel">Cancel</a>
                    <button type="submit" class="btn-form-save">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ВНЕШНИЕ ИЗОЛИРОВАННЫЕ ФОРМЫ-->
    <div th:if="${projectDto.id() != null}" style="display: none;">

        <!-- Пулы форм для каждой картинки -->
        <div th:each="img : ${projectDto.projectImages}">
            <!-- Форма удаления картинки -->
            <form th:id="'deleteImageForm-' + ${img.id()}" th:action="@{/admin/projects/media/image/{id}/delete(id=${img.id()})}" method="post">
                <input type="hidden" name="projectId" th:value="${projectDto.id()}">
            </form>

            <!-- Форма обновления сортировки -->
            <form th:id="'sortImageForm-' + ${img.id()}" th:action="@{/admin/projects/media/image/{id}/sort(id=${img.id()})}" method="post">
                <input type="hidden" name="projectId" th:value="${projectDto.id()}">
                <input type="hidden" th:id="'hiddenSort-' + ${img.id()}" name="sortOrder">
            </form>
        </div>
        <!-- Форма удаления одиночного документа -->
        <div th:if="${projectDto.projectDocument != null}">
            <form th:id="'deleteDocForm-' + ${projectDto.projectDocument.id()}" th:action="@{/admin/projects/media/document/{id}/delete(id=${projectDto.projectDocument.id()})}" method="post">
                <input type="hidden" name="projectId" th:value="${projectDto.id()}">
            </form>
        </div>
    </div>

    <script>
        function submitExternalSort(buttonElement) {
            const imageId = buttonElement.getAttribute('data-image-id');

            const inputVal = document.getElementById('sortInput-' + imageId).value;

            document.getElementById('hiddenSort-' + imageId).value = inputVal;
            document.getElementById('sortImageForm-' + imageId).submit();
        }
    </script>

    </body>
</html>
