<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Berry Homes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-slate-50 font-sans flex flex-col justify-center items-center min-h-screen text-center p-4">

<div class="max-w-md bg-white p-8 rounded-xl shadow-sm border border-slate-100">
    <div class="text-6xl text-red-600 mb-4"><i class="bi bi-slash-circle-fill"></i></div>
    <h1 class="text-4xl font-black text-slate-900 mb-2">500</h1>
    <h2 class="text-xl font-bold text-slate-700 mb-4">Internal Server Error</h2>

    <p class="text-sm text-gray-500 leading-relaxed mb-8">
        An unexpected error occurred on our server. Our development team has been notified. Please try again later.
    </p>

    <a href="/" class="inline-flex items-center gap-2 bg-slate-900 text-white font-bold text-sm px-6 py-3 rounded-lg hover:bg-black transition w-full justify-center">
        Return to Safety
    </a>
</div>

</body>
</html>
