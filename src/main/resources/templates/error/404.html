<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Berry Homes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-slate-50 font-sans flex flex-col justify-center items-center min-h-screen text-center p-4">

<div class="max-w-md bg-white p-8 rounded-xl shadow-sm border border-slate-100">
    <div class="text-6xl text-emerald-600 mb-4"><i class="bi bi-exclamation-circle-fill"></i></div>
    <h1 class="text-4xl font-black text-slate-900 mb-2">404</h1>
    <h2 class="text-xl font-bold text-slate-700 mb-4">Resource Not Found</h2>

    <!-- Динамический вывод сообщения из нашего ExceptionHandler -->
    <p class="text-sm text-gray-500 leading-relaxed mb-8" th:text="${message}">
        The page or property project you are looking for does not exist or has been archived.
    </p>

    <a href="/" class="inline-flex items-center gap-2 bg-emerald-600 text-white font-bold text-sm px-6 py-3 rounded-lg hover:bg-emerald-700 transition w-full justify-center">
        <i class="bi bi-arrow-left"></i> Back to Main Hub
    </a>
</div>

</body>
</html>
