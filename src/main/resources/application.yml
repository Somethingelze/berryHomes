spring:
  application:
    name: berryHomes

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
      resolve-lazily: true

  datasource:
#    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:berryhomes}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:berryhomes}
    username: ${DB_USERNAME:some}
    password: ${DB_PASSWORD:some}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    redis:
      time-to-live: 60m
      cache-null-values: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: berryhomes

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: berryhomes

  thymeleaf:
    cache: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:email@gmail.ru}
    password: ${MAIL_PASSWORD:app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_STARTTLS:false}

#    host: smtp.gmail.com
 #   port: 587
    # TODO ввести актуальные данные!!!
  #  username: ${MAIL_USERNAME:email@gmail.ru}
   # password: ${MAIL_PASSWORD:app-password}
    #properties:
     # mail:
      #  smtp:
       #   auth: true
        #  starttls:
         #   enable: true

logging:
  file:
    name: logs/berryhomes.log

  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr([%X{requestId}]){yellow} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"

  logback:
    rollingpolicy:
      file-name-pattern: "logs/archived/berryhomes-%d{yyyy-MM-dd}-%i.log.gz"
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 2GB

server:
  tomcat:
    max-part-count: 50

app:
  upload:
    dir: uploads
  management:
    email: ${MAIL_MANAGER:manager@berryhomes.com}