spring:
  application:
    name: berryHomes

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:berryhomes}
    username: ${DB_USERNAME:some}
    password: ${DB_PASSWORD:some}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

app:
  upload:
    dir: uploads
