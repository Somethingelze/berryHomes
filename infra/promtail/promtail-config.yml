server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /berryhomes
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: 'container'

    pipeline_stages:
      # 1. Склеиваем многострочные логи (Stacktrace) на основе вашей маски даты "yyyy-MM-dd"
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_wait_time: 3s

      # 2. Вытаскиваем полезные метаданные из вашего паттерна консоли логов
      # Паттерн вытащит уровень лога (level) и ваш кастомный [requestId] для удобного поиска в Grafana
      - regex:
          expression: '^(?P<log_time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3})\s+(?P<level>[A-Z]{5})\s+\d+\s+---\s+\[[^\]]+\]\s+\[(?P<request_id>[^\]]*)\]'

      # 3. Делаем уровень лога и requestId доступными для фильтрации в интерфейсе Grafana
      - labels:
          level:
          request_id: